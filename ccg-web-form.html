<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Carhartt Company Gear Support</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

    *{
        box-sizing:border-box;
        margin:0;
        padding:0;
    }

    body{
        font-family:'Inter',sans-serif;
        background:#1f1f1f;
        color:#f5f5f5;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:40px 20px;
    }

    .container{
        width:100%;
        max-width:820px;
        background:#2b2b2b;
        border:1px solid #3a3a3a;
        border-radius:18px;
        overflow:hidden;
        box-shadow:0 10px 40px rgba(0,0,0,.35);
    }

    .hero{
        background:
        linear-gradient(
            rgba(0,0,0,.55),
            rgba(0,0,0,.55)
        ),
        url('https://images.unsplash.com/photo-1504307651254-35680f356dfd?q=80&w=1600&auto=format&fit=crop');
        background-size:cover;
        background-position:center;
        padding:60px 50px;
        border-bottom:4px solid #ffb81c;
    }

    .hero h1{
        font-size:38px;
        font-weight:700;
        margin-bottom:12px;
        letter-spacing:-1px;
    }

    .hero p{
        color:#d8d8d8;
        font-size:16px;
        max-width:500px;
        line-height:1.6;
    }

    .form-wrapper{
        padding:40px;
    }

    .grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:22px;
    }

    .field{
        display:flex;
        flex-direction:column;
    }

    .field.full{
        grid-column:1 / -1;
    }

    label{
        margin-bottom:8px;
        font-size:14px;
        font-weight:600;
        color:#f2f2f2;
    }

    input,
    select,
    textarea{
        width:100%;
        background:#1e1e1e;
        border:1px solid #4a4a4a;
        color:#fff;
        border-radius:10px;
        padding:14px 16px;
        font-size:15px;
        transition:.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus{
        outline:none;
        border-color:#ffb81c;
        box-shadow:0 0 0 3px rgba(255,184,28,.15);
    }

    textarea{
        min-height:140px;
        resize:vertical;
    }

    .submit-btn{
        margin-top:28px;
        width:100%;
        background:#ffb81c;
        color:#1f1f1f;
        border:none;
        padding:16px;
        border-radius:12px;
        font-size:16px;
        font-weight:700;
        cursor:pointer;
        transition:.2s ease;
    }

    .submit-btn:hover{
        background:#ffc94a;
        transform:translateY(-1px);
    }

    .footer-note{
        margin-top:18px;
        text-align:center;
        color:#9d9d9d;
        font-size:13px;
    }

    @media(max-width:768px){

        .hero{
            padding:40px 28px;
        }

        .hero h1{
            font-size:30px;
        }

        .form-wrapper{
            padding:28px;
        }

        .grid{
            grid-template-columns:1fr;
        }
    }

</style>
</head>

<body>

<div class="container">

    <div class="hero">
        <h1>Company Gear Support</h1>
        <p>
            Need help with embroidery, screen printing, orders, or outfitting your team?
            Submit a request and our Carhartt Company Gear team will contact you shortly.
        </p>
    </div>

    <div class="form-wrapper">

        <form action="https://carhartt--uat.sandbox.my.salesforce.com/servlet/servlet.WebToCase?encoding=UTF-8&orgId=00DOu00000B80Md" method="POST">

            <input type="hidden" name="orgid" value="00DOu00000B80Md" />
            <input type="hidden" name="retURL" value="https://companygear.carhartt.com" />
            <input type="hidden" name="recordType" id="recordType" value="0120h000000CF7J" />

            <div class="grid">

                <div class="field">
                    <label for="00NPY0000056CbV">First Name</label>
                    <input 
                        id="00NPY0000056CbV"
                        name="00NPY0000056CbV"
                        type="text"
                        maxlength="40"
                        placeholder="Enter first name"
                    />
                </div>

                <div class="field">
                    <label for="00NPY0000056Chx">Last Name</label>
                    <input 
                        id="00NPY0000056Chx"
                        name="00NPY0000056Chx"
                        type="text"
                        maxlength="40"
                        placeholder="Enter last name"
                    />
                </div>

                <div class="field">
                    <label for="email">Email Address</label>
                    <input 
                        id="email"
                        name="email"
                        type="email"
                        maxlength="80"
                        required
                        placeholder="name@company.com"
                    />
                </div>

                <div class="field">
                    <label for="00NPY0000056ClB">Country</label>
                    <input 
                        id="00NPY0000056ClB"
                        name="00NPY0000056ClB"
                        type="text"
                        maxlength="20"
                        placeholder="United States"
                    />
                </div>

                <div class="field full">
                    <label for="reason">Reason for Contact</label>

                    <select id="reason" name="reason" required>

                        <option value="">
                            Select a reason
                        </option>

                        <option value="Embroidery Questions">
                            Embroidery Questions
                        </option>

                        <option value="Screen Print Questions">
                            Screen Print Questions
                        </option>

                        <option value="Where's my order?">
                            Where's my order?
                        </option>

                        <option value="I want to outfit my employees">
                            I want to outfit my employees
                        </option>

                        <option value="I need to change/cancel my order">
                            I need to change/cancel my order
                        </option>

                        <option value="Other">
                            Other
                        </option>

                    </select>
                </div>

                <div class="field full">
                    <label for="subject">Subject</label>

                    <input
                        id="subject"
                        name="subject"
                        type="text"
                        maxlength="80"
                        placeholder="Brief summary of your request"
                    />
                </div>

                <div class="field full">
                    <label for="description">Comments</label>

                    <textarea
                        id="description"
                        name="description"
                        required
                        placeholder="Please provide details about your request..."
                    ></textarea>
                </div>

            </div>

            <button type="submit" class="submit-btn">
                Submit Request
            </button>

            <div class="footer-note">
                Carhartt Company Gear Support
            </div>

        </form>

    </div>

</div>

</body>
</html>
